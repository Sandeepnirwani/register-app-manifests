apiVersion: apps/v1

kind: Deployment

metadata:
  name: register-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: register-app

  template:
    metadata:
      labels:
        app: register-app

    spec:
      containers:
      - name: register-app
        image: sandeep3333/register-app:7

        ports:
        - containerPort: 8080